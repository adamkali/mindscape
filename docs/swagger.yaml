      tags:
      - Folders
  /folders/{folder_id}:
    delete:
      consumes:
      - application/json
      description: Delete a Folder by Authorization Header and tries to cascade delete
      operationId: DeleteFolder
      parameters:
      - default: '"e38e78a4-2ca3-4c59-a3ea-a2019866e593"'
