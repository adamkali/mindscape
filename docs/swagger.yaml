          schema:
            $ref: '#/definitions/StringResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/StringResponse'
      summary: Get User Background Choice
      tags:
      - Users
    patch:
      description: |-
        Set User Background Choice by background name
        by query param.
      operationId: SetUserBackground
      parameters:
      - default: Bearer token
        description: admin header
        in: header
        name: Authorization
        required: true
        type: string
      - description: background
        in: query
        name: background
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/StringResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/StringResponse'
        "500":
