      tags:
      - Bookmarks
  /folders:
    get:
      consumes:
      - application/json
      description: |-
        Get the Root Folders associated with the user by Authorization Header
        and will also try to get the children of the folder as well
      operationId: GetRootFolders
      parameters:
      - default: '"Bearer token"'
        description: Authorization Header
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
