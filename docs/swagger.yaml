      id:
        type: string
      name:
        type: string
      updated_datetime:
        type: string
      user_id:
        type: string
    type: object
  responses.FolderData:
    properties:
      bookmarks:
        items:
          $ref: '#/definitions/repository.Bookmark'
        type: array
      children:
        items:
          $ref: '#/definitions/repository.Folder'
