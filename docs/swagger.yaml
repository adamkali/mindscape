paths:
  /background:
    get:
      description: Get Default Background
      operationId: GetDefaultBackground
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/StringResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/StringResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/StringResponse'
      summary: Get Default Background
      tags:
      - Background
  /background/choices:
    get:
      description: Get Background Choices
      operationId: GetBackgroundChoices
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BackgroundResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/BackgroundResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/BackgroundResponse'
      summary: Get Background Choices that ae loaded into the server.
      tags:
      - Background
  /bookmarks:
    patch:
      consumes:
      - application/json
      description: |-
        Move a Bookmark by Authorization Header, and my a
        ParentFolderId [parent_id].
      operationId: MoveBookmark
      parameters:
      - description: Move Bookmark Request
        in: body
        name: MoveBookmarkRequest
        required: true
        schema:
          $ref: '#/definitions/MoveBookmarkRequest'
      - default: '"Bearer token"'
        description: Authorization Header
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BookmarksResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/BookmarksResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/BookmarksResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/BookmarksResponse'
      summary: Move a Bookmark
      tags:
      - Bookmarks
    post:
      consumes:
      - application/json
      description: Create a new Bookmark by Authorization Header
      operationId: CreateBookmark
      parameters:
      - description: CreateBookmarkRequest
        in: body
        name: CreateBookmarkRequest
        required: true
        schema:
          $ref: '#/definitions/repository.CreateBookmarkParams'
      - default: '"Bearer token"'
        description: Authorization Header
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BookmarkResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/BookmarkResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/BookmarkResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/BookmarkResponse'
      summary: Create a new Bookmark
      tags:
      - Bookmarks
  /bookmarks/folder/{bookmark_id}:
    delete:
      consumes:
      - application/json
      description: |-
        Delete a Bookmark by Authorization Header, and my a
        ParentFolderId [parent_id].
      operationId: DeleteBookmark
      parameters:
      - default: '"Bearer token"'
        description: Authorization Header
        in: header
        name: Authorization
        required: true
        type: string
      - default: '"e38e78a4-2ca3-4c59-a3ea-a2019866e593"'
        description: Parent Folder ID
        in: path
        name: bookmark_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/BookmarksResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/BookmarksResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/BookmarksResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/BookmarksResponse'
      summary: Delete a Bookmark
      tags:
      - Bookmarks
  /bookmarks/folder/{parent_id}:
    get:
      consumes:
      - application/json
      description: |-
        Get all Bookmarks by Authorization Header and by the
        ParentFolderId [parent_id]
      operationId: GetBookmarks
      parameters:
      - default: '"Bearer token"'
        description: Authorization Header
        in: header
        name: Authorization
        required: true
        type: string
      - default: '"e38e78a4-2ca3-4c59-a3ea-a2019866e593"'
