root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "dlv exec ./tmp/mindscape --headless --listen=:2345 --api-version=2 --accept-multiclient --continue"
  cmd = "go build -buildvcs=false -gcflags='all=-N -l' -o ./tmp/mindscape ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "web/node_modules", "web/dist"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "dlv exec ./tmp/mindscape --headless --listen=:2345 --api-version=2 --accept-multiclient --continue"
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "2s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = "#6633ea"
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = true
  keep_scroll = true
