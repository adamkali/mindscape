name: Convert Neorg Documentation

on:
  push:
    branches: [ main, master, dev, nightly ]
    paths: [ 'docs/**' ]
  pull_request:
    branches: [ main, master, dev, nightly ]
    paths: [ 'docs/**' ]
  workflow_dispatch:

jobs:
  convert-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check if docs directory exists
      id: check-docs
      run: |
        if [ -d "docs" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "No docs/ directory found, skipping conversion"
        fi
        
    - name: Create tarball of .norg files only
      if: steps.check-docs.outputs.exists == 'true'
      id: create-tarball
      run: |
        # Find all .norg files and create tarball
        norg_count=$(find docs/ -name "*.norg" -type f | wc -l)
        echo "Found $norg_count .norg files"
        
        if [ "$norg_count" -eq 0 ]; then
          echo "No .norg files found, skipping conversion"
          echo "has_norg_files=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        find docs/ -name "*.norg" -type f | tar -czf docs.tar.gz -T -
        echo "Created docs.tar.gz with .norg files only:"
        tar -tzf docs.tar.gz | head -20
        echo "has_norg_files=true" >> $GITHUB_OUTPUT
        
    - name: Convert Neorg to Markdown via Lambda
      if: steps.create-tarball.outputs.has_norg_files == 'true'
      id: convert
      run: |
        echo "Uploading docs.tar.gz to Neorg Documentation Lambda..."
        
        response=$(curl -s -w "%{http_code}" \
          -X POST \
          -H "x-auth-token: ${{ secrets.NEORG_DOCUMENTATION_AUTH_TOKEN }}" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @docs.tar.gz \
          -o converted-docs.zip \
          "${{ vars.NEORG_LAMBDA_ENDPOINT || 'https://neorg-documentation-lambda.production.endpoint' }}")
        
        http_code="${response: -3}"
        
        if [ "$http_code" -eq 200 ]; then
          echo "✅ Conversion successful"
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Conversion failed with HTTP $http_code"
          echo "success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
        
    - name: Extract converted documentation
      if: steps.convert.outputs.success == 'true'
      run: |
        echo "Extracting converted documentation..."
        unzip -q converted-docs.zip -d converted/
        echo "Converted files:"
        find converted/ -name "*.md" | head -20
        
    - name: Initialize and update GitHub wiki
      if: steps.convert.outputs.success == 'true' && github.event_name != 'pull_request'
      run: |
        echo "Adding converted documentation to repository..."
        
        # Create documentation directory in main repository
        mkdir -p wiki
        
        # Copy converted markdown files to wiki directory
        if [ -d "converted" ]; then
          echo "Copying converted documentation files..."
          find converted/ -name "*.md" -type f | while read -r file; do
            # Get relative path without the 'converted/' prefix  
            rel_path="${file#converted/}"
            # Create target directory in wiki if needed
            target_dir="wiki/$(dirname "$rel_path")"
            mkdir -p "$target_dir"
            # Copy file to wiki directory
            cp "$file" "wiki/$rel_path"
            echo "Copied: $file -> wiki/$rel_path"
          done
        fi
        
        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Set up authentication for git operations
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        
        # Add all changes to the main repository
        git add wiki/
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to documentation"
        else
          # Commit changes to main repository
          git commit -m "docs: update documentation from Neorg files

          Generated from Neorg files in docs/ directory
          Converted via Neorg Documentation Lambda
          Triggered by: ${{ github.event_name }}
          Branch: ${{ github.ref_name }}
          Source commit: ${{ github.sha }}"
          
          # Push changes to main repository
          git push origin HEAD
          echo "✅ Documentation updated in repository at /wiki/"
        fi
        
        # Try to update GitHub wiki if it exists
        echo "Attempting to update GitHub wiki..."
        
        # Check if wiki repository exists first
        wiki_exists=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/pages" | jq -r '.source.branch // empty' 2>/dev/null || echo "")
        
        # Try to clone wiki repository
        if git ls-remote https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git > /dev/null 2>&1; then
          echo "Wiki repository exists, cloning..."
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo
          
          # Copy files to wiki with wiki-friendly names
          if [ -d "converted" ]; then
            find converted/ -name "*.md" -type f | while read -r file; do
              filename=$(basename "$file")
              # Create wiki-friendly filename (remove .md, replace hyphens/underscores with spaces, capitalize)
              wiki_name=$(echo "$filename" | sed 's/\.md$//' | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1' | tr ' ' '-')
              cp "$file" "wiki-repo/${wiki_name}.md"
              echo "Copied to wiki: $file -> ${wiki_name}.md"
            done
          fi
          
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "Update documentation from ${{ github.repository }}@${{ github.sha }}"
            # Try to push to both master and main branches
            git push origin HEAD:master 2>/dev/null || git push origin HEAD:main 2>/dev/null || {
              echo "Failed to push to wiki - trying to initialize..."
              # If push fails, try to create the first commit
              git push origin HEAD:master --force 2>/dev/null || git push origin HEAD:main --force 2>/dev/null || echo "Failed to initialize wiki"
            }
            echo "✅ GitHub wiki updated"
          else
            echo "No changes to push to wiki"
          fi
          cd ..
        else
          echo "ℹ️  GitHub wiki repository not found. To enable wiki uploads:"
          echo "   1. Go to https://github.com/${{ github.repository }}/settings"
          echo "   2. Scroll down to 'Features' section"
          echo "   3. Check 'Wikis' if not already enabled"
          echo "   4. Go to https://github.com/${{ github.repository }}/wiki"
          echo "   5. Create the first wiki page manually to initialize the repository"
          echo ""
          echo "📁 Documentation has been saved to /wiki/ directory in the main repository"
        fi
        
    - name: Show converted documentation (PR only)
      if: steps.convert.outputs.success == 'true' && github.event_name == 'pull_request'
      run: |
        echo "📖 Documentation conversion successful for pull request!"
        echo "Converted files would be added to repository:"
        
        # Show what files would be added
        if [ -d "converted" ]; then
          find converted/ -name "*.md" -type f | while read -r file; do
            rel_path="${file#converted/}"
            echo "  - wiki/$rel_path"
          done
        fi
        
        echo ""
        echo "ℹ️  Note: Documentation is not committed on pull requests."
        echo "   Files will be automatically added to /wiki/ directory when merged to main branch."
        echo "   Documentation will also be synced to GitHub wiki if available."
        
    - name: Upload conversion artifacts
      if: always() && steps.create-tarball.outputs.has_norg_files == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: neorg-conversion-artifacts
        path: |
          docs.tar.gz
          converted-docs.zip
          converted/
        retention-days: 7

