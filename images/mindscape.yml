# Mindscape Docker Compose
#
# Before running, copy the example config:
#   cp config/docker.yaml.example config/docker.yaml
#
# Then start the stack:
#   docker compose up -d
#
# Access the app at http://localhost:60000

services:
  postgres:
    image: postgres:16-alpine
    container_name: mindscape-postgres
    environment:
      POSTGRES_USER: mindscape
      POSTGRES_PASSWORD: mindscape_secret_password
      POSTGRES_DB: mindscape
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindscape -d mindscape"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mindscape-network

  redis:
    image: redis:7-alpine
    container_name: mindscape-redis
    command: redis-server --requirepass redis_secret_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mindscape-network

  minio:
    image: minio/minio:latest
    container_name: mindscape-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_access_key
      MINIO_ROOT_PASSWORD: minio_secret_key
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mindscape-network

  minio-init:
    image: minio/mc:latest
    container_name: mindscape-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minio_access_key minio_secret_key;
      mc mb --ignore-existing myminio/mindspace;
      mc anonymous set download myminio/mindspace;
      echo 'Bucket mindspace created successfully';
      exit 0;
      "
    networks:
      - mindscape-network

  mindscape:
    image: ghcr.io/adamkali/mindscape:latest
    container_name: mindscape-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "60000:60000"
    volumes:
      - ./config/docker.yaml:/app/config/docker.yaml:ro
    environment:
      - MINDSCAPE_ENV=docker
    entrypoint: >
      /bin/sh -c "
      echo 'Running database migrations...';
      ./mindscape db up -e docker;
      echo 'Starting mindscape server...';
      ./mindscape -e docker
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:60000/api/_health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mindscape-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  mindscape-network:
    driver: bridge
